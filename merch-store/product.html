<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — Old Blood Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="style.css">
<style>
.product-page { padding: 48px 0 80px; }

.product-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: start;
}

/* Gallery */
.product-gallery { position: sticky; top: 80px; }
.gallery-main {
  aspect-ratio: 3/4;
  background: linear-gradient(145deg, var(--bg3), var(--red-deep));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.gallery-main-bg {
  position: absolute;
  inset: 0;
  opacity: .6;
}
.gallery-main-icon {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.gallery-thumbs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.gallery-thumb {
  aspect-ratio: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color .2s;
}
.gallery-thumb.active { border-color: var(--red-hot); }
.gallery-thumb:hover { border-color: var(--border2); }

/* Product Info */
.product-info {}

.product-meta-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.product-info-category {
  font-family: var(--font-condensed);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--red-hot);
}

.product-info-name {
  font-family: var(--font-display);
  font-size: clamp(36px, 4vw, 56px);
  color: var(--cream);
  line-height: 1;
  letter-spacing: .03em;
  margin-bottom: 20px;
}

.product-info-price {
  font-family: var(--font-display);
  font-size: 40px;
  color: var(--cream);
  letter-spacing: .02em;
  margin-bottom: 28px;
  display: flex;
  align-items: baseline;
  gap: 12px;
}
.product-info-price .old {
  font-size: 22px;
  color: var(--text-dim);
  text-decoration: line-through;
  font-family: var(--font-condensed);
  font-weight: 400;
}

.product-info-desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.8;
  margin-bottom: 32px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}

.info-label {
  font-family: var(--font-condensed);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.info-label a {
  color: var(--red-hot);
  font-size: 10px;
  transition: opacity .2s;
}
.info-label a:hover { opacity: .7; }

.size-grid-full {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 28px;
}
.size-btn-full {
  min-width: 52px;
  height: 48px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-condensed);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .08em;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
}
.size-btn-full:hover { border-color: var(--red-hot); color: var(--red-hot); }
.size-btn-full.active { background: var(--red-hot); border-color: var(--red-hot); color: #fff; }
.size-btn-full.oos { opacity: .3; cursor: not-allowed; text-decoration: line-through; }

.qty-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.qty-control-lg {
  display: flex;
  align-items: center;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  overflow: hidden;
}
.qty-btn-lg {
  width: 44px;
  height: 44px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .15s;
}
.qty-btn-lg:hover { color: var(--cream); background: var(--surface); }
.qty-val-lg {
  width: 48px;
  text-align: center;
  font-family: var(--font-condensed);
  font-size: 16px;
  font-weight: 700;
  color: var(--cream);
  border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  line-height: 44px;
}

.add-btn-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.product-guarantees {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  padding: 20px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}
.guarantee-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-condensed);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .06em;
  color: var(--text-muted);
}
.guarantee-item svg { color: var(--red-hot); flex-shrink: 0; }

/* Details accordion */
.accordion { border-top: 1px solid var(--border); }
.accordion-item { border-bottom: 1px solid var(--border); }
.accordion-btn {
  width: 100%;
  background: none;
  border: none;
  padding: 16px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  color: var(--cream);
  font-family: var(--font-condensed);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  text-align: left;
}
.accordion-btn svg { color: var(--text-muted); transition: transform .2s; flex-shrink: 0; }
.accordion-btn.open svg { transform: rotate(180deg); }
.accordion-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.8;
}
.accordion-content.open { max-height: 500px; padding-bottom: 16px; }
.accordion-content ul { padding-left: 0; }
.accordion-content li { padding: 4px 0; display: flex; align-items: flex-start; gap: 8px; }
.accordion-content li::before { content: '—'; color: var(--red-dim); flex-shrink: 0; }

/* Related */
.related-section { padding: 64px 0; border-top: 1px solid var(--border); }
.related-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-top: 32px; }

@media (max-width: 1024px) {
  .product-layout { grid-template-columns: 1fr; gap: 32px; }
  .product-gallery { position: static; }
  .related-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .add-btn-row { flex-direction: column; }
  .related-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<header class="site-header" id="site-header"></header>
<main>
  <div class="container product-page">

    <!-- Breadcrumb -->
    <div style="display:flex;align-items:center;gap:8px;font-family:var(--font-condensed);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:32px;" id="breadcrumb">
      <a href="index.html" style="transition:color .2s;" onmouseover="this.style.color='var(--cream)'" onmouseout="this.style.color=''">Store</a>
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      <span id="bc-category" style="color:var(--text-muted)"></span>
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      <span id="bc-name" style="color:var(--text-muted)"></span>
    </div>

    <div class="product-layout" id="product-layout">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- Related Products -->
  <section class="related-section">
    <div class="container">
      <div class="section-label">You might also like</div>
      <h2 class="section-title" style="font-size:36px;">MORE FROM OB</h2>
      <div class="related-grid" id="related-grid"></div>
    </div>
  </section>
</main>
<footer class="site-footer" id="site-footer"></footer>
<script src="store.js"></script>
<script>
  injectHeader('');
  injectFooter();

  const params = new URLSearchParams(location.search);
  const productId = params.get('id') || 'p001';
  let product = PRODUCTS.find(p => p.id === productId) || PRODUCTS[0];
  let selectedSize = '';
  let qty = 1;

  // Breadcrumb
  document.getElementById('bc-category').textContent = product.category;
  document.getElementById('bc-name').textContent = product.name;
  document.title = `${product.name} — Old Blood Store`;

  // Size buttons
  function sizeBtns() {
    return product.sizes.map(s => `
      <button class="size-btn-full${selectedSize === s ? ' active' : ''}"
        onclick="selectSize('${s}')">${s}</button>
    `).join('');
  }

  function selectSize(s) {
    selectedSize = s;
    document.getElementById('size-grid-el').innerHTML = sizeBtns();
  }

  function changeProductQty(delta) {
    qty = Math.max(1, qty + delta);
    document.getElementById('qty-val').textContent = qty;
  }

  function handleAddToCart() {
    if (product.sizes.length > 0 && !selectedSize) {
      document.getElementById('size-error').style.display = 'block';
      return;
    }
    for (let i = 0; i < qty; i++) {
      addToCart({ id: product.id, name: product.name, price: product.price, category: product.category, size: selectedSize, color: product.color });
    }
  }

  function toggleAccordion(el) {
    const content = el.nextElementSibling;
    el.classList.toggle('open');
    content.classList.toggle('open');
  }

  // Render product
  document.getElementById('product-layout').innerHTML = `
    <div class="product-gallery">
      <div class="gallery-main">
        <div class="gallery-main-bg" style="background:linear-gradient(145deg,var(--bg3),var(--red-deep));"></div>
        <div class="gallery-main-icon">
          <svg width="72" height="72" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="opacity:.18;color:var(--red-hot)">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width=".8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/>
          </svg>
          <span style="font-family:var(--font-display);font-size:18px;letter-spacing:.14em;color:rgba(184,0,10,.3)">OLD BLOOD</span>
        </div>
        ${product.badge ? `<span class="product-badge badge-${product.badge}" style="position:absolute;top:20px;left:20px;">${product.badgeLabel}</span>` : ''}
      </div>
      <div class="gallery-thumbs">
        ${[1,2,3,4].map((i) => `
          <div class="gallery-thumb${i===1?' active':''}" onclick="document.querySelectorAll('.gallery-thumb').forEach(t=>t.classList.remove('active'));this.classList.add('active')">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="opacity:.2;color:var(--red-hot)">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>`).join('')}
      </div>
    </div>

    <div class="product-info">
      <div class="product-meta-row">
        <span class="product-info-category">${product.category}</span>
        <span style="font-family:var(--font-condensed);font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;">${product.badge === 'new' ? '🔴 NEW' : product.badge === 'sale' ? '🟠 ON SALE' : ''}</span>
      </div>
      <h1 class="product-info-name">${product.name}</h1>
      <div class="product-info-price">
        $${product.price.toFixed(2)}
        ${product.oldPrice ? `<span class="old">$${product.oldPrice.toFixed(2)}</span>` : ''}
      </div>
      <p class="product-info-desc">${product.description}</p>

      ${product.sizes.length > 0 ? `
        <div class="info-label">
          Select Size ${selectedSize ? `<span style="color:var(--cream);font-family:var(--font-condensed);font-size:12px;font-weight:700;">${selectedSize}</span>` : ''}
          <a href="#">Size Guide</a>
        </div>
        <div class="size-grid-full" id="size-grid-el">${sizeBtns()}</div>
        <div id="size-error" style="display:none;color:var(--red-hot);font-family:var(--font-condensed);font-size:12px;font-weight:600;letter-spacing:.08em;margin-bottom:12px;margin-top:-16px;">Please select a size</div>
      ` : `<div id="size-grid-el"></div><div id="size-error"></div>`}

      <div class="info-label" style="margin-bottom:12px;">Quantity</div>
      <div class="qty-row" style="margin-bottom:20px;">
        <div class="qty-control-lg">
          <button class="qty-btn-lg" onclick="changeProductQty(-1)">−</button>
          <span class="qty-val-lg" id="qty-val">1</span>
          <button class="qty-btn-lg" onclick="changeProductQty(1)">+</button>
        </div>
      </div>

      <div class="add-btn-row">
        <button class="btn btn-primary btn-lg" style="flex:1;" onclick="handleAddToCart()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          Add to Cart
        </button>
        <button class="btn btn-outline" title="Save for later">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
        </button>
      </div>

      <div class="product-guarantees">
        <div class="guarantee-item">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Free shipping over $80
        </div>
        <div class="guarantee-item">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          30-day returns
        </div>
        <div class="guarantee-item">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          Secure checkout
        </div>
      </div>

      <div class="accordion">
        <div class="accordion-item">
          <button class="accordion-btn" onclick="toggleAccordion(this)">
            Product Details
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div class="accordion-content">
            <ul>${product.details.map(d => `<li>${d}</li>`).join('')}</ul>
          </div>
        </div>
        <div class="accordion-item">
          <button class="accordion-btn" onclick="toggleAccordion(this)">
            Sizing & Fit
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div class="accordion-content">
            <ul>
              <li>Model is 6'1" and wearing size L</li>
              <li>Oversized fit — size down if you prefer fitted</li>
              <li>Measurements: S (95cm chest), M (100cm), L (106cm), XL (112cm)</li>
            </ul>
          </div>
        </div>
        <div class="accordion-item">
          <button class="accordion-btn" onclick="toggleAccordion(this)">
            Shipping & Returns
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div class="accordion-content">
            <ul>
              <li>Standard: 3–7 business days</li>
              <li>Express: 1–3 business days</li>
              <li>Free standard shipping on orders over $80</li>
              <li>30-day returns on unworn, unwashed items with tags</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  `;

  // Related products
  const related = PRODUCTS.filter(p => p.id !== product.id).slice(0, 4);
  document.getElementById('related-grid').innerHTML = related.map(productCardHTML).join('');
</script>
</body>
</html>
